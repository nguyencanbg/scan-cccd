<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quét QR CCCD</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    #qr-reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }

    #result {
      margin-top: 20px;
      color: green;
      font-weight: bold;
      word-break: break-all;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>📷 Quét QR CCCD</h2>

<div id="qr-reader"></div>

<p>Đưa mã QR vào khung</p>

<div id="result">👉 Kết quả sẽ hiển thị ở đây</div>

<script>
  // 🔗 URL của Google Apps Script (thay thế ID_WEBAPP)
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwQW46V9GOs2VyAqpEo5NZ7RlM_VYgIGM3UmPgf5OMWk6HqQsXswTzQ_mN7sEk5PCd6Sg/exec";

  let qr;

  async function startScan() {
    qr = new Html5Qrcode("qr-reader");

    try {
      // Lấy danh sách camera
      const devices = await Html5Qrcode.getCameras();

      if (!devices || devices.length === 0) {
        alert("❌ Không tìm thấy camera");
        return;
      }

      // Chọn camera sau (thường là camera chính diện)
      const cameraId = devices[devices.length - 1].id;

      const config = {
        fps: 10,
        qrbox: 250
      };

      await qr.start(
        cameraId,
        config,
        (decodedText) => {
          console.log("QR thành công:", decodedText);
          // Hiển thị kết quả lên màn hình
          document.getElementById("result").innerText = decodedText;

          // 🔥 CHUYỂN HƯỚNG SANG APPS SCRIPT VỚI DỮ LIỆU CCCD
          window.location.href = GAS_URL + "?cccd=" + encodeURIComponent(decodedText);
        },
        () => {} // Lỗi quét không cần xử lý
      );

    } catch (err) {
      alert("❌ Lỗi camera: " + err);
      console.error(err);
    }
  }

  startScan();
</script>

</body>
</html>
