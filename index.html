<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Quét QR CCCD - Nhanh & Chính xác</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      text-align: center;
      padding: 12px;
      background: rgba(0,0,0,0.9);
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      z-index: 10;
    }
    .camera-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      max-width: 280px;
      height: 70%;
      max-height: 280px;
      border: 2px solid #4caf50;
      border-radius: 20px;
      box-shadow: 0 0 0 100vmax rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 10;
    }
    .controls {
      padding: 12px;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    button, select {
      background: #d90429;
      border: none;
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    select { background: #333; }
    .info {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      background: rgba(0,0,0,0.7);
      color: #ccc;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 20px;
      border-radius: 30px;
      color: white;
      z-index: 20;
      display: none;
      font-size: 14px;
    }
  </style>
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
  <div class="header">📷 QUÉT MÃ QR CCCD</div>
  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-frame"></div>
  </div>
  <div class="controls">
    <select id="cameraSelect" style="display: none;"></select>
    <button id="closeBtn">Đóng</button>
  </div>
  <div class="info">✅ Đưa mã QR vào khung xanh · 🔄 Tự động quét</div>
  <div id="loadingMsg" class="loading">⏳ Đang khởi tạo camera...</div>

  <script>
    const video = document.getElementById('video');
    let scanning = true;
    let animationId = null;
    let lastScanTime = 0;
    const SCAN_INTERVAL = 120; // ms (~8 lần/giây)
    let currentStream = null;
    let currentDeviceId = null;

    async function stopCamera() {
      scanning = false;
      if (animationId) cancelAnimationFrame(animationId);
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
      }
      video.srcObject = null;
    }

    async function startCamera(deviceId) {
      await stopCamera();
      scanning = true;
      document.getElementById('loadingMsg').style.display = 'flex';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: deviceId }, facingMode: 'environment' }
        });
        currentStream = stream;
        video.srcObject = stream;
        await video.play();
        document.getElementById('loadingMsg').style.display = 'none';
        lastScanTime = 0;
        animationId = requestAnimationFrame(scanFrame);
      } catch (err) {
        document.getElementById('loadingMsg').innerHTML = "❌ Lỗi camera: " + err.message;
        document.getElementById('loadingMsg').style.display = 'flex';
        scanning = false;
      }
    }

    function scanFrame(now) {
      if (!scanning) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth && video.videoHeight) {
        if (now - lastScanTime >= SCAN_INTERVAL) {
          lastScanTime = now;
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
          if (code) {
            scanning = false;
            cancelAnimationFrame(animationId);
            stopCamera();
            if (window.opener && !window.opener.closed) {
              window.opener.postMessage({ type: 'qr-scanned', value: code.data }, '*');
              alert("✅ Quét thành công!");
              window.close();
            } else {
              alert("Lỗi: Không tìm thấy cửa sổ cha.");
              startCamera(currentDeviceId);
            }
            return;
          }
        }
      }
      animationId = requestAnimationFrame(scanFrame);
    }

    async function init() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        if (!videoDevices.length) throw new Error("Không tìm thấy camera");
        let rearCam = videoDevices.find(d => 
          d.label.toLowerCase().includes('back') ||
          d.label.toLowerCase().includes('rear') ||
          d.label.toLowerCase().includes('environment')
        );
        if (!rearCam && videoDevices.length > 1) rearCam = videoDevices[videoDevices.length - 1];
        const selected = rearCam || videoDevices[0];
        currentDeviceId = selected.deviceId;
        if (videoDevices.length > 1) {
          const select = document.getElementById('cameraSelect');
          select.style.display = 'inline-block';
          videoDevices.forEach(dev => {
            const opt = document.createElement('option');
            opt.value = dev.deviceId;
            opt.text = dev.label || (dev.deviceId === currentDeviceId ? 'Camera sau' : 'Camera trước');
            if (dev.deviceId === currentDeviceId) opt.selected = true;
            select.appendChild(opt);
          });
          select.onchange = () => {
            if (animationId) cancelAnimationFrame(animationId);
            currentDeviceId = select.value;
            startCamera(currentDeviceId);
          };
        }
        await startCamera(currentDeviceId);
      } catch (err) {
        alert("Lỗi: " + err.message);
      }
    }

    document.getElementById('closeBtn').onclick = () => window.close();
    window.onload = init;
  </script>
</body>
</html>
