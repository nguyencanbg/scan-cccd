<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quét QR CCCD</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    #qr-reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }

    #result {
      margin-top: 20px;
      color: green;
      font-weight: bold;
      word-break: break-all;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>📷 Quét QR CCCD</h2>

<div id="qr-reader"></div>

<p>Đưa mã QR vào khung</p>

<div id="result">👉 Kết quả sẽ hiển thị ở đây</div>

<script>
  let qr;

  async function startScan() {
    qr = new Html5Qrcode("qr-reader");

    try {
      // 🔥 LẤY DANH SÁCH CAMERA
      const devices = await Html5Qrcode.getCameras();

      if (!devices || devices.length === 0) {
        alert("❌ Không tìm thấy camera");
        return;
      }

      // 👉 CHỌN CAMERA SAU (ổn định nhất)
      const cameraId = devices[devices.length - 1].id;

      const config = {
        fps: 10,
        qrbox: 250
      };

      await qr.start(
        cameraId,
        config,
        (decodedText) => {
          console.log("QR:", decodedText);

          // 👉 HIỂN THỊ
          document.getElementById("result").innerText = decodedText;

          // 👉 GỬI VỀ APPS SCRIPT
          if (window.opener) {
            window.opener.postMessage({
              type: "QR_RESULT",
              data: decodedText
            }, "*");
          }

          alert("✅ Quét thành công!");

          qr.stop();

          // Khi tích hợp thì mở lại
          // window.close();
        },
        () => {}
      );

    } catch (err) {
      alert("❌ Lỗi camera: " + err);
      console.error(err);
    }
  }

  startScan();
</script>

</body>
</html>
