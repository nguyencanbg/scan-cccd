<script>
  let qr;

  function startScan() {
    qr = new Html5Qrcode("qr-reader");

    const config = {
      fps: 15,
      qrbox: function(viewfinderWidth, viewfinderHeight) {
        let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        let size = Math.floor(minEdge * 0.8);
        return { width: size, height: size };
      },
      aspectRatio: 1.0,
      disableFlip: false
    };

    qr.start(
      { facingMode: "environment" },
      config,
      (decodedText) => {
        console.log("QR đọc được:", decodedText);

        if (window.opener) {
          window.opener.postMessage({
            type: "QR_RESULT",
            data: decodedText
          }, "*");
        }

        alert("✅ Quét thành công!");
        qr.stop();
        window.close();
      },
      (error) => {
        // debug (có thể bật nếu cần)
        // console.log(error);
      }
    ).catch(err => {
      alert("❌ Không mở được camera: " + err);
    });
  }

  startScan();
</script>
