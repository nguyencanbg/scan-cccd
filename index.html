<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Quét QR CCCD - Nhận diện QR nhỏ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: system-ui, 'Segoe UI', -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .camera-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    /* Khung quét vẫn giữ nguyên để hướng dẫn, nhưng thực tế vùng quét được zoom ở trung tâm */
    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      border-radius: 24px;
      background: transparent;
      box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(76, 175, 80, 0.9);
    }

    .scan-frame::before,
    .scan-frame::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #4caf50;
      border-style: solid;
      border-width: 0;
    }

    .scan-frame::before {
      top: -2px;
      left: -2px;
      border-top-width: 4px;
      border-left-width: 4px;
      border-radius: 8px 0 0 0;
    }

    .scan-frame::after {
      bottom: -2px;
      right: -2px;
      border-bottom-width: 4px;
      border-right-width: 4px;
      border-radius: 0 0 8px 0;
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #4caf50, #4caf50, transparent);
      animation: scan 2s linear infinite;
      box-shadow: 0 0 6px #4caf50;
    }

    @keyframes scan {
      0% { top: 0; }
      50% { top: 100%; }
      100% { top: 0; }
    }

    .controls {
      padding: 15px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    button {
      background: #d90429;
      border: none;
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    button:active {
      transform: scale(0.96);
    }

    .info {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      background: rgba(0,0,0,0.6);
      color: #ccc;
      backdrop-filter: blur(4px);
    }

    .status-badge {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #ffaa44;
      z-index: 25;
      font-family: monospace;
      pointer-events: none;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      padding: 16px 24px;
      border-radius: 40px;
      color: white;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top: 2px solid #4caf50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
  <div class="header">📷 QUÉT MÃ QR CCCD</div>
  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="overlay">
      <div class="scan-frame">
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="status-badge" id="statusBadge">⚙️ Đang khởi tạo...</div>
  </div>
  <div class="controls">
    <button id="closeBtn">Đóng</button>
  </div>
  <div class="info">✅ Đưa mã QR vào giữa khung, tự động phóng đại để quét QR nhỏ nhất</div>
  <div id="loadingMsg" class="loading" style="display: none;">
    <div class="spinner"></div> Đang xử lý...
  </div>

  <script>
    (function() {
      let scanning = true;
      const video = document.getElementById('video');
      const statusBadge = document.getElementById('statusBadge');
      let currentStream = null;
      let animationId = null;
      let lastScanTime = 0;
      const SCAN_INTERVAL = 100; // quét nhanh hơn

      // Cấu hình zoom: lấy vùng trung tâm với tỉ lệ bao nhiêu % của khung hình
      const ZOOM_RATIO = 2.2;   // phóng to 1.8 lần (có thể điều chỉnh)
      // Thực tế: crop 1/ZOOM_RATIO vùng trung tâm rồi phóng lên kích thước gốc

      function setStatus(text, isError = false) {
        statusBadge.innerHTML = text;
        statusBadge.style.color = isError ? '#ff8888' : '#aaffaa';
      }

      async function stopCamera() {
        scanning = false;
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
          currentStream = null;
        }
        video.srcObject = null;
      }

      function onCodeFound(code) {
        if (!scanning) return;
        scanning = false;
        stopCamera().then(() => {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type: 'qr-scanned', value: code }, '*');
          }
          window.close();
        }).catch(() => window.close());
      }

      async function startScanner() {
        try {
          // Yêu cầu độ phân giải cao để lấy nhiều chi tiết
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: 'environment',
              width: { ideal: 1920 },
              height: { ideal: 1080 }
            }
          });
          currentStream = stream;
          video.srcObject = stream;
          await video.play();
          setStatus("✅ Camera sẵn sàng - Zoom số tự động");

          // Canvas dùng để quét (sẽ được phóng to)
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          function scanFrame() {
            if (!scanning) return;
            
            const now = Date.now();
            if (now - lastScanTime >= SCAN_INTERVAL) {
              lastScanTime = now;
              
              if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth && video.videoHeight) {
                const vw = video.videoWidth;
                const vh = video.videoHeight;
                
                // Tính toán vùng crop trung tâm theo tỉ lệ zoom
                const cropWidth = vw / ZOOM_RATIO;
                const cropHeight = vh / ZOOM_RATIO;
                const startX = (vw - cropWidth) / 2;
                const startY = (vh - cropHeight) / 2;
                
                // Canvas tạm để vẽ vùng crop và phóng to
                canvas.width = vw;        // phóng to bằng kích thước video gốc
                canvas.height = vh;
                ctx.drawImage(video, startX, startY, cropWidth, cropHeight, 0, 0, vw, vh);
                
                // Lấy dữ liệu ảnh từ canvas đã phóng to
                const imageData = ctx.getImageData(0, 0, vw, vh);
                const code = jsQR(imageData.data, vw, vh, {
                  inversionAttempts: 'dontInvert',
                });
                
                if (code && scanning) {
                  onCodeFound(code.data);
                  return;
                }
              }
            }
            animationId = requestAnimationFrame(scanFrame);
          }
          
          scanFrame();
        } catch (err) {
          console.error(err);
          setStatus("❌ Không thể truy cập camera. Kiểm tra quyền.", true);
          const loadingDiv = document.getElementById('loadingMsg');
          loadingDiv.innerHTML = '❌ Lỗi: Không thể khởi tạo camera';
          loadingDiv.style.display = 'flex';
        }
      }

      const loadingDiv = document.getElementById('loadingMsg');
      loadingDiv.style.display = 'flex';
      startScanner().finally(() => {
        loadingDiv.style.display = 'none';
      });

      document.getElementById('closeBtn').onclick = () => window.close();
      window.addEventListener('beforeunload', () => stopCamera());
    })();
  </script>
</body>
</html>
