<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quét mã QR CCCD - Nhanh & Chính xác</title>
    <style>
        body { ... }
        #reader { ... }
        button { ... }
        .info { ... }
        .loading { ... }
        select { ... }
        /* Có thể thêm style cho khung hướng dẫn */
        .scan-region {
            position: absolute;
            border: 2px solid rgba(0, 255, 0, 0.5);
            box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
    <h3>📷 Quét mã QR trên CCCD</h3>
    <div id="reader"></div>
    <div>
        <select id="cameraSelect" style="display: none;"></select>
    </div>
    <div class="loading" id="loadingMsg">⏳ Đang khởi tạo camera...</div>
    <button onclick="window.close()">Đóng</button>
    <div class="info">
        ✅ Đưa mã QR vào giữa khung hình<br>
        🔄 Quét tự động, kết quả sẽ gửi về form
    </div>

    <script>
        // --- Các biến toàn cục ---
        let html5QrCode = null;
        let currentCameraId = null;
        let animationId = null;
        let lastTimestamp = 0;
        const FRAME_INTERVAL = 100; // ms
        
        // --- Các biến cho BarcodeDetector ---
        let videoElement = null;
        let canvasElement = null;
        let canvasContext = null;
        let detector = null;
        let useNativeDetector = false;

        // --- Hàm khởi tạo chính ---
        async function initCamera() {
            document.getElementById('loadingMsg').style.display = 'block';
            try {
                const devices = await Html5Qrcode.getCameras();
                if (!devices || devices.length === 0) throw new Error("Không tìm thấy camera.");
                
                let rearCam = devices.find(dev => dev.label.toLowerCase().includes('back') || dev.label.toLowerCase().includes('rear'));
                if (!rearCam && devices.length > 1) rearCam = devices[devices.length - 1];
                const selectedId = rearCam ? rearCam.id : devices[0].id;
                currentCameraId = selectedId;
                
                // Hiển thị dropdown nếu có nhiều camera
                if (devices.length > 1) {
                    const select = document.getElementById('cameraSelect');
                    select.style.display = 'inline-block';
                    select.innerHTML = '';
                    devices.forEach(dev => {
                        const option = document.createElement('option');
                        option.value = dev.id;
                        option.text = dev.label || (dev.id.includes('back') ? 'Camera sau' : 'Camera trước');
                        if (dev.id === selectedId) option.selected = true;
                        select.appendChild(option);
                    });
                    select.onchange = () => {
                        if (animationId) cancelAnimationFrame(animationId);
                        if (videoElement && videoElement.srcObject) {
                            videoElement.srcObject.getTracks().forEach(track => track.stop());
                        }
                        currentCameraId = select.value;
                        startScanning(currentCameraId);
                    };
                }
                await startScanning(selectedId);
            } catch (err) {
                console.error("Lỗi khởi tạo camera:", err);
                document.getElementById('loadingMsg').innerHTML = "❌ Lỗi truy cập camera: " + err.message;
                document.getElementById('loadingMsg').style.display = 'block';
            }
        }

        // --- Bắt đầu quét với một camera ID cụ thể ---
        async function startScanning(cameraId) {
            document.getElementById('loadingMsg').style.display = 'block';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: cameraId } } });
                const videoTrack = stream.getVideoTracks()[0];
                
                if (!videoElement) {
                    videoElement = document.createElement('video');
                    videoElement.setAttribute('playsinline', '');
                }
                videoElement.srcObject = stream;
                await videoElement.play();
                
                // Khởi tạo canvas
                if (!canvasElement) {
                    canvasElement = document.createElement('canvas');
                    canvasContext = canvasElement.getContext('2d');
                }
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                
                // Khởi tạo BarcodeDetector nếu có
                if ('BarcodeDetector' in window) {
                    detector = new BarcodeDetector({ formats: ['qr_code'] });
                    useNativeDetector = true;
                } else {
                    useNativeDetector = false;
                    console.warn("Trình duyệt không hỗ trợ BarcodeDetector, sử dụng jsQR dự phòng.");
                }
                
                // Bắt đầu vòng lặp xử lý
                if (animationId) cancelAnimationFrame(animationId);
                lastTimestamp = 0;
                animationId = requestAnimationFrame(processFrame);
                document.getElementById('loadingMsg').style.display = 'none';
            } catch (err) {
                console.error("Lỗi khởi động camera:", err);
                document.getElementById('loadingMsg').innerHTML = "❌ Không thể khởi động camera. Hãy kiểm tra quyền truy cập hoặc thử lại.";
                document.getElementById('loadingMsg').style.display = 'block';
            }
        }
        
        // --- Xử lý từng khung hình ---
        async function processFrame(now) {
            if (now - lastTimestamp >= FRAME_INTERVAL) {
                lastTimestamp = now;
                if (videoElement && canvasContext) {
                    canvasContext.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                    const imageData = canvasContext.getImageData(0, 0, canvasElement.width, canvasElement.height);
                    
                    let decodedText = null;
                    if (useNativeDetector && detector) {
                        try {
                            const barcodes = await detector.detect(imageData);
                            if (barcodes.length > 0) decodedText = barcodes[0].rawValue;
                        } catch (err) { console.warn(err); }
                    } 
                    
                    if (!decodedText) {
                        // Dự phòng jsQR
                        const code = jsQR(imageData.data, canvasElement.width, canvasElement.height);
                        if (code) decodedText = code.data;
                    }
                    
                    if (decodedText) {
                        // Tìm thấy QR code, gửi kết quả
                        if (animationId) cancelAnimationFrame(animationId);
                        if (videoElement && videoElement.srcObject) {
                            videoElement.srcObject.getTracks().forEach(track => track.stop());
                        }
                        if (window.opener) {
                            window.opener.postMessage({ type: 'qr-scanned', value: decodedText }, '*');
                            alert("✅ Quét thành công!");
                            window.close();
                        } else {
                            alert("Lỗi: Không tìm thấy cửa sổ cha.");
                        }
                        return;
                    }
                }
            }
            animationId = requestAnimationFrame(processFrame);
        }

        // Bắt đầu khi trang tải xong
        window.onload = () => {
            initCamera();
        };
    </script>
</body>
</html>
