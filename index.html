<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quét QR CCCD</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: sans-serif;
      text-align: center;
      color: white;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }

    .title {
      padding: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      background: #d90429;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="title">📷 Quét QR CCCD</div>
<div id="reader"></div>
<button onclick="closeWindow()">Đóng</button>

<script>
  let qr;

  function onScanSuccess(decodedText) {
    console.log("QR:", decodedText);

    // STOP NGAY để tránh quét lại
    qr.stop().then(() => {

      // Gửi dữ liệu về Apps Script
      if (window.opener) {
        window.opener.postMessage({
          type: "qr-scanned",
          value: decodedText
        }, "*");

        window.close();
      } else {
        alert("Không tìm thấy cửa sổ cha");
      }

    });
  }

  function startScan() {
    qr = new Html5Qrcode("reader");

    const config = {
      fps: 10, // giảm fps để tăng độ ổn định
      qrbox: { width: 280, height: 280 },

      // 🔥 QUAN TRỌNG: giúp nhận QR CCCD tốt hơn
      formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],

      // 🔥 FIX nhận QR mờ
      experimentalFeatures: {
        useBarCodeDetectorIfSupported: true
      }
    };

    Html5Qrcode.getCameras().then(devices => {
      if (devices.length) {

        // ưu tiên camera sau
        let cameraId = devices[devices.length - 1].id;

        qr.start(cameraId, config, onScanSuccess)
          .catch(err => {
            console.error(err);
            alert("Không mở được camera");
          });

      }
    });
  }

  function closeWindow() {
    if (qr) {
      qr.stop().then(() => window.close());
    } else {
      window.close();
    }
  }

  window.onload = startScan;
</script>

</body>
</html>
