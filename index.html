<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Quét mã QR CCCD</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; background: #f0f0f0; }
    #reader { width: 100%; max-width: 500px; margin: 0 auto; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 16px; background: #d90429; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #b00322; }
    .info { margin-top: 15px; color: #555; font-size: 14px; }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <h3>📷 Quét mã QR CCCD</h3>
  <div id="reader"></div>
  <button onclick="window.close()">Đóng</button>
  <div class="info">Đưa mã QR vào khung hình, hệ thống sẽ tự động quét và gửi kết quả về form.</div>
  <script>
    let html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanError);
    
    function onScanSuccess(decodedText) {
      if (window.opener) {
        window.opener.postMessage({ type: 'qr-scanned', value: decodedText }, '*');
        alert("✅ Quét thành công!");
        window.close();
      } else {
        alert("Lỗi: Không tìm thấy cửa sổ cha.");
      }
    }
    
    function onScanError(errorMessage) {
      // Bỏ qua lỗi quét thông thường
    }
  </script>
</body>
</html>
