<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Quét QR CCCD - Nhanh & Chính xác</title>

  <!-- ENGINE MẠNH -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      font-family: 'Segoe UI', system-ui;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      text-align: center;
      padding: 12px;
      background: rgba(0,0,0,0.9);
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .camera-container {
      flex: 1;
      position: relative;
      background: #000;
    }
    #reader {
      width: 100%;
      height: 100%;
    }
    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      max-width: 280px;
      height: 70%;
      max-height: 280px;
      border: 2px solid #4caf50;
      border-radius: 20px;
      box-shadow: 0 0 0 100vmax rgba(0,0,0,0.5);
      pointer-events: none;
    }
    .controls {
      padding: 12px;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    button, select {
      background: #d90429;
      border: none;
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    select { background: #333; }
    .info {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      background: rgba(0,0,0,0.7);
      color: #ccc;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 12px 20px;
      border-radius: 30px;
      color: white;
      z-index: 20;
      display: none;
    }
  </style>
</head>

<body>

<div class="header">📷 QUÉT MÃ QR CCCD</div>

<div class="camera-container">
  <div id="reader"></div>
  <div class="scan-frame"></div>
</div>

<div class="controls">
  <select id="cameraSelect" style="display:none;"></select>
  <button onclick="closeScan()">Đóng</button>
</div>

<div class="info">
  ✅ Đưa mã QR vào khung xanh · 🔄 Tự động quét
</div>

<div id="loadingMsg" class="loading">⏳ Đang khởi tạo camera...</div>

<script>
let html5QrCode;
let currentCameraId = null;

// ================== START CAMERA ==================
async function startScanner(cameraId) {
  document.getElementById('loadingMsg').style.display = 'block';

  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch(e) {}
  }

  html5QrCode = new Html5Qrcode("reader");

  const config = {
    fps: 15,
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0,
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true
    }
  };

  try {
    await html5QrCode.start(
      cameraId,
      config,
      onScanSuccess
    );

    document.getElementById('loadingMsg').style.display = 'none';
  } catch (err) {
    console.error(err);
    alert("❌ Không mở được camera");
  }
}

// ================== INIT CAMERA ==================
async function initCamera() {
  try {
    const devices = await Html5Qrcode.getCameras();

    if (!devices.length) {
      alert("Không tìm thấy camera");
      return;
    }

    let rearCam = devices.find(d =>
      d.label.toLowerCase().includes('back') ||
      d.label.toLowerCase().includes('rear')
    );

    if (!rearCam) rearCam = devices[devices.length - 1];

    currentCameraId = rearCam.id;

    // dropdown camera
    if (devices.length > 1) {
      const select = document.getElementById('cameraSelect');
      select.style.display = 'inline-block';

      devices.forEach(dev => {
        const opt = document.createElement('option');
        opt.value = dev.id;
        opt.text = dev.label || "Camera";
        if (dev.id === currentCameraId) opt.selected = true;
        select.appendChild(opt);
      });

      select.onchange = () => startScanner(select.value);
    }

    await startScanner(currentCameraId);

  } catch (err) {
    console.error(err);
    alert("Không truy cập được camera");
  }
}

// ================== SUCCESS ==================
function onScanSuccess(decodedText) {
  if (html5QrCode) {
    html5QrCode.stop().catch(e => console.log(e));
  }

  try {
    if (window.opener) {
      window.opener.postMessage(decodedText, "*");
    } else {
      localStorage.setItem("QR_RESULT", decodedText);
    }
  } catch (e) {
    console.error(e);
  }

  setTimeout(() => window.close(), 300);
}

// ================== CLOSE ==================
function closeScan() {
  if (html5QrCode) {
    html5QrCode.stop().catch(e => console.log(e));
  }
  window.close();
}

// ================== START ==================
window.onload = initCamera;
</script>

</body>
</html>
