<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Scan CCCD</title>
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    video {
      width: 100%;
      height: auto;
    }

    .btn-close {
      position: fixed;
      top: 20px;
      right: 20px;
      background: red;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    .guide {
      position: fixed;
      bottom: 20px;
      width: 100%;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<button class="btn-close" onclick="window.close()">Đóng</button>

<div class="guide">
  📷 Đưa mã QR CCCD vào giữa màn hình
</div>

<script>
  const codeReader = new ZXing.BrowserMultiFormatReader();

  async function startScan() {
    try {
      const devices = await codeReader.listVideoInputDevices();

      const backCamera = devices.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear")
      ) || devices[0];

      codeReader.decodeFromVideoDevice(
        backCamera.deviceId,
        'video',
        (result, err) => {
         if (result) {
  alert("QR đọc được: " + result.text);
}

            // trả dữ liệu về web cha
            window.opener.postMessage(result.text, "*");

            codeReader.reset();
            window.close();
          }
        }
      );

    } catch (err) {
      alert("Không mở được camera: " + err);
    }
  }

  startScan();
</script>

</body>
</html>
