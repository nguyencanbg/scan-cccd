<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Quét QR CCCD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #d90429; color: white; text-align: center; padding: 15px; font-weight: bold; }
    .camera-container { flex: 1; position: relative; background: #000; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; border: 2px solid #4caf50; border-radius: 20px; box-shadow: 0 0 0 100vmax rgba(0,0,0,0.6); }
    .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #4caf50; animation: scan 2s linear infinite; }
    @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
    .controls { padding: 15px; background: #111; display: flex; justify-content: center; }
    button { background: #d90429; color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .info { text-align: center; padding: 8px; color: #ccc; background: #000; font-size: 13px; }
    .status { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; color: #ffaa44; font-size: 12px; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #4caf50; color: white; padding: 8px 20px; border-radius: 30px; z-index: 100; animation: fadeOut 2s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
  </style>
</head>
<body>
<div class="header">📷 QUÉT MÃ QR CCCD</div>
<div class="camera-container">
  <video id="video" playsinline muted></video>
  <div class="scan-frame"><div class="scan-line"></div></div>
  <div class="status" id="status">⚙️ Đang khởi tạo...</div>
</div>
<div class="controls">
  <button id="closeBtn">Đóng</button>
</div>
<div class="info">✅ Đưa mã QR vào khung · Tự động đọc</div>

<script>
(function() {
  let scanner = null;
  let stream = null;
  let scanning = true;
  let scanned = false;
  const video = document.getElementById('video');
  const statusDiv = document.getElementById('status');
  
  function setStatus(text, isError) {
    statusDiv.innerHTML = text;
    statusDiv.style.color = isError ? '#ff8888' : '#aaffaa';
  }
  
  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
  
  function onCodeFound(code) {
    if (!scanning || scanned) return;
    scanning = false;
    scanned = true;
    setStatus("✅ Quét thành công! Nhấn Đóng.");
    showToast("✅ Quét thành công!");
    // Lưu vào localStorage để trang cha đọc được
    localStorage.setItem('qr_scanned_code', code);
    // Gửi postMessage (nếu opener tồn tại)
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ type: 'qr-scanned', value: code }, '*');
    }
    // Dừng camera
    if (scanner) {
      try { scanner.stop(); scanner.destroy(); } catch(e) {}
      scanner = null;
    }
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    if (video && video.srcObject) video.srcObject = null;
  }
  
  // Tăng contrast canvas
  function enhanceContrast(canvasEl, factor) {
    const ctx = canvasEl.getContext('2d');
    const imgData = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
      data[i] = Math.min(255, Math.max(0, (data[i] - 128) * factor + 128));
      data[i+1] = Math.min(255, Math.max(0, (data[i+1] - 128) * factor + 128));
      data[i+2] = Math.min(255, Math.max(0, (data[i+2] - 128) * factor + 128));
    }
    ctx.putImageData(imgData, 0, 0);
    return canvasEl;
  }
  
  async function startScanner() {
    try {
      const QrScanner = (await import('https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js')).default;
      scanner = new QrScanner(video, result => onCodeFound(result.data), {
        onDecodeError: () => {},
        highlightScanRegion: true,
        maxScansPerSecond: 15,
        preferredCamera: 'environment',
        onDecode: (canvas) => enhanceContrast(canvas, 1.6)
      });
      setStatus("✅ Sẵn sàng - Quét QR");
      await scanner.start();
      stream = video.srcObject;
      return true;
    } catch(err) {
      console.error(err);
      setStatus("❌ Lỗi camera", true);
      return false;
    }
  }
  
  (async () => {
    await startScanner();
  })();
  
  document.getElementById('closeBtn').onclick = () => {
    if (scanner) { scanner.stop(); scanner.destroy(); }
    if (stream) { stream.getTracks().forEach(t => t.stop()); }
    window.close();
  };
  
  window.addEventListener('beforeunload', () => {
    if (scanner) scanner.destroy();
    if (stream) stream.getTracks().forEach(t => t.stop());
  });
})();
</script>
</body>
</html>
