<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Quét QR CCCD - Nhanh & Chính xác</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 15px;
      background: #111;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      z-index: 10;
    }

    .camera-container {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #qr-reader {
      width: 100%;
      height: 100%;
      background: #000;
    }

    /* Tuỳ chỉnh lại khung quét của html5-qrcode */
    #qr-reader__scan_region {
      border: none !important;
      background: transparent !important;
    }

    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      max-width: 280px;
      height: 70%;
      max-height: 280px;
      border: 2px solid #4caf50;
      border-radius: 20px;
      box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5);
      pointer-events: none;
      z-index: 20;
    }

    .controls {
      padding: 15px;
      background: #111;
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
    }

    button {
      background: #d90429;
      border: none;
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.96);
    }

    .info {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      background: #000000aa;
      color: #ddd;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      padding: 12px 20px;
      border-radius: 40px;
      color: white;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      pointer-events: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Ẩn các thành phần không mong muốn từ thư viện */
    #qr-reader__dashboard,
    #qr-reader__status_span {
      display: none !important;
    }

    #qr-reader__video {
      object-fit: cover !important;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
  <!-- Thư viện html5-qrcode phiên bản mới nhất (ổn định) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <div class="header">📷 QUÉT MÃ QR CCCD</div>
  <div class="camera-container">
    <div id="qr-reader"></div>
    <div class="scan-frame"></div>
  </div>
  <div class="controls">
    <button id="closeBtn">Đóng</button>
  </div>
  <div class="info">✅ Đưa mã QR vào khung xanh · 🔄 Tự động quét · Nhanh và chính xác</div>
  <div id="loadingMsg" class="loading">
    <div class="spinner"></div> Đang khởi tạo camera...
  </div>

  <script>
    let html5QrCode = null;
    let isScanning = true;
    const loadingDiv = document.getElementById('loadingMsg');

    // Hàm gửi kết quả về window.opener và đóng popup
    function onScanSuccess(decodedText, decodedResult) {
      if (!isScanning) return; // tránh gửi nhiều lần

      isScanning = false;
      
      // Dừng luồng quét để giải phóng tài nguyên
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          console.log("QR Scanner stopped.");
        }).catch(err => console.warn("Lỗi khi dừng scanner:", err));
      }

      // Gửi dữ liệu về cửa sổ cha (ứng dụng chính)
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'qr-scanned', value: decodedText }, '*');
      } else {
        // Nếu không tìm thấy cửa sổ cha, vẫn đóng nhưng có thể log lỗi (không ảnh hưởng)
        console.warn("Không tìm thấy cửa sổ cha để gửi kết quả.");
      }

      // Đóng popup ngay lập tức, không cần xác nhận
      window.close();
    }

    function onScanError(errorMessage) {
      // Không làm gì với lỗi quét, chỉ log ra console nếu cần debug
      // console.debug("QR scan error:", errorMessage);
    }

    async function startScanner() {
      loadingDiv.style.display = 'flex';
      try {
        html5QrCode = new Html5Qrcode("qr-reader");
        
        // Cấu hình camera: ưu tiên camera sau, độ phân giải vừa phải để tăng tốc
        const config = {
          fps: 15,                 // khung hình/giây - đủ nhanh, không quá tải
          qrbox: { width: 280, height: 280 }, // khung quét kích thước vừa
          aspectRatio: 1.0,
          disableFlip: false,
          facingMode: "environment" // camera sau
        };
        
        await html5QrCode.start(
          { facingMode: "environment" }, // dùng camera sau
          config,
          onScanSuccess,
          onScanError
        );
        loadingDiv.style.display = 'none';
      } catch (err) {
        console.error("Lỗi khởi tạo scanner:", err);
        loadingDiv.innerHTML = '❌ Không thể truy cập camera hoặc thiết bị không hỗ trợ.';
        // Thử fallback: camera mặc định
        try {
          if (html5QrCode) await html5QrCode.stop();
          await html5QrCode.start(
            { facingMode: "user" }, // camera trước
            { fps: 15, qrbox: { width: 280, height: 280 } },
            onScanSuccess,
            onScanError
          );
          loadingDiv.style.display = 'none';
        } catch (e) {
          loadingDiv.innerHTML = '❌ Lỗi: Không tìm thấy camera nào. Hãy kiểm tra quyền truy cập.';
        }
      }
    }

    // Đóng popup khi bấm nút
    document.getElementById('closeBtn').onclick = () => window.close();

    // Khởi động quét khi trang load
    startScanner();

    // Dọn dẹp khi popup bị đóng đột ngột
    window.addEventListener('beforeunload', () => {
      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().catch(e => console.warn(e));
      }
    });
  </script>
</body>
</html>
