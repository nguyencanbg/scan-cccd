<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Quét QR CCCD - Nhanh & Chính xác</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: system-ui, 'Segoe UI', -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .camera-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Lớp phủ khung quét đẹp mắt */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      border-radius: 24px;
      background: transparent;
      box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(76, 175, 80, 0.9);
    }

    .scan-frame::before,
    .scan-frame::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #4caf50;
      border-style: solid;
      border-width: 0;
    }

    .scan-frame::before {
      top: -2px;
      left: -2px;
      border-top-width: 4px;
      border-left-width: 4px;
      border-radius: 8px 0 0 0;
    }

    .scan-frame::after {
      bottom: -2px;
      right: -2px;
      border-bottom-width: 4px;
      border-right-width: 4px;
      border-radius: 0 0 8px 0;
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #4caf50, #4caf50, transparent);
      animation: scan 2s linear infinite;
      box-shadow: 0 0 6px #4caf50;
    }

    @keyframes scan {
      0% { top: 0; }
      50% { top: 100%; }
      100% { top: 0; }
    }

    .controls {
      padding: 15px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    button {
      background: #d90429;
      border: none;
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    button:active {
      transform: scale(0.96);
    }

    .info {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      background: rgba(0,0,0,0.6);
      color: #ccc;
      backdrop-filter: blur(4px);
    }

    .status-badge {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #ffaa44;
      z-index: 25;
      font-family: monospace;
      pointer-events: none;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      padding: 16px 24px;
      border-radius: 40px;
      color: white;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top: 2px solid #4caf50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">📷 QUÉT MÃ QR CCCD</div>
  <div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="overlay">
      <div class="scan-frame">
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="status-badge" id="statusBadge">⚙️ Đang khởi tạo...</div>
  </div>
  <div class="controls">
    <button id="closeBtn">Đóng</button>
  </div>
  <div class="info">✅ Đưa mã QR vào khung xanh · Tự động quét nhanh</div>
  <div id="loadingMsg" class="loading" style="display: none;">
    <div class="spinner"></div> Đang xử lý...
  </div>

  <script>
    (function() {
      let scanning = true;
      let videoElement = document.getElementById('video');
      let statusBadge = document.getElementById('statusBadge');
      let currentStream = null;

      // Hàm hiển thị trạng thái
      function setStatus(text, isError = false) {
        statusBadge.innerHTML = text;
        statusBadge.style.color = isError ? '#ff8888' : '#aaffaa';
      }

      // Dừng camera
      async function stopCamera() {
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
          currentStream = null;
        }
        videoElement.srcObject = null;
      }

      // Gửi kết quả và đóng popup
      function onCodeFound(code) {
        if (!scanning) return;
        scanning = false;
        
        // Dừng camera ngay
        stopCamera();
        
        // Gửi về cửa sổ cha
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'qr-scanned', value: code }, '*');
        }
        // Đóng popup không cần confirm
        window.close();
      }

      // ========== PHƯƠNG PHÁP 1: Native BarcodeDetector (nhanh nhất) ==========
      async function startNativeScanner() {
        if (!('BarcodeDetector' in window)) {
          console.log("Native BarcodeDetector không hỗ trợ, fallback sang phương pháp khác");
          return false;
        }
        
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
          });
          currentStream = stream;
          videoElement.srcObject = stream;
          await videoElement.play();
          setStatus("📷 Native scanner đã sẵn sàng");
          
          const detector = new BarcodeDetector({ formats: ['qr_code'] });
          let lastTime = 0;
          const interval = 150; // ms giữa các lần quét
            
          const scan = async () => {
            if (!scanning) return;
            requestAnimationFrame(async () => {
              if (!scanning) return;
              const now = Date.now();
              if (now - lastTime < interval) {
                requestAnimationFrame(scan);
                return;
              }
              lastTime = now;
              if (videoElement.readyState === 4 && videoElement.videoWidth > 0) {
                try {
                  const barcodes = await detector.detect(videoElement);
                  if (barcodes.length > 0 && scanning) {
                    const code = barcodes[0].rawValue;
                    onCodeFound(code);
                    return;
                  }
                } catch (err) {
                  // lỗi nhẹ, bỏ qua
                }
              }
              requestAnimationFrame(scan);
            });
          };
          requestAnimationFrame(scan);
          return true;
        } catch (err) {
          console.error("Lỗi native scanner:", err);
          setStatus("⚠️ Lỗi camera native, chuyển sang chế độ dự phòng", true);
          return false;
        }
      }

      // ========== PHƯƠNG PHÁP 2: Dự phòng dùng canvas + jsQR (nhẹ, kiểm soát giao diện) ==========
      async function startFallbackScanner() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
          });
          currentStream = stream;
          videoElement.srcObject = stream;
          await videoElement.play();
          setStatus("🔄 Chế độ dự phòng (cnv+jsQR)");
          
          // Tải jsQR từ CDN (nhẹ hơn html5-qrcode)
          await new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
          
          let lastTime = 0;
          const interval = 120;
          
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          const scanFrame = async () => {
            if (!scanning) return;
            requestAnimationFrame(async () => {
              if (!scanning) return;
              const now = Date.now();
              if (now - lastTime < interval) {
                requestAnimationFrame(scanFrame);
                return;
              }
              lastTime = now;
              if (videoElement.readyState === 4 && videoElement.videoWidth > 0) {
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, canvas.width, canvas.height, {
                  inversionAttempts: 'dontInvert',
                });
                if (code && scanning) {
                  onCodeFound(code.data);
                  return;
                }
              }
              requestAnimationFrame(scanFrame);
            });
          };
          requestAnimationFrame(scanFrame);
          return true;
        } catch (err) {
          console.error("Fallback scanner lỗi:", err);
          setStatus("❌ Không thể truy cập camera", true);
          return false;
        }
      }

      // Khởi động
      (async () => {
        const loading = document.getElementById('loadingMsg');
        loading.style.display = 'flex';
        
        let success = await startNativeScanner();
        if (!success) {
          success = await startFallbackScanner();
        }
        
        if (!success) {
          statusBadge.innerHTML = "❌ Không có camera hoặc bị từ chối quyền";
          loading.innerHTML = '❌ Lỗi: Không thể khởi tạo camera';
          loading.style.display = 'flex';
        } else {
          loading.style.display = 'none';
        }
      })();

      document.getElementById('closeBtn').onclick = () => window.close();
      
      // Cleanup khi đóng trang
      window.addEventListener('beforeunload', () => {
        stopCamera();
      });
    })();
  </script>
</body>
</html>
