<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Scan CCCD</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    video {
      width: 100%;
      height: auto;
    }

    /* KHUNG QUÉT */
    .scan-box {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 260px;
      height: 260px;
      transform: translate(-50%, -50%);
      border: 3px solid #00ffcc;
      border-radius: 10px;
      box-shadow: 0 0 15px #00ffcc;
    }

    .btn-close {
      position: fixed;
      top: 20px;
      right: 20px;
      background: red;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      z-index: 9999;
    }

    .guide {
      position: fixed;
      bottom: 20px;
      width: 100%;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<div class="scan-box"></div>

<button class="btn-close" onclick="window.close()">Đóng</button>

<div class="guide">
  📷 Đưa mã QR CCCD vào trong khung
</div>

<script>
  const codeReader = new ZXing.BrowserMultiFormatReader();

  async function startScan() {
    try {
      const constraints = {
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      };

      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      const video = document.getElementById("video");
      video.srcObject = stream;

      video.onloadedmetadata = () => {
        video.play();
      };

      codeReader.decodeFromVideoElement(
        video,
        (result, err) => {

          if (result) {
            alert("QR đọc được:\n\n" + result.text);

            codeReader.reset();
          }

          if (err && !(err instanceof ZXing.NotFoundException)) {
            console.error(err);
          }
        }
      );

    } catch (err) {
      alert("Không mở được camera: " + err);
    }
  }

  startScan();
</script>

</body>
</html>
