<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Scan CCCD</title>

  <!-- THƯ VIỆN QUÉT QR MẠNH NHẤT -->
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      text-align: center;
      color: white;
      font-family: Arial;
    }

    video {
      width: 100%;
      height: auto;
    }

    .btn-close {
      position: fixed;
      top: 20px;
      right: 20px;
      background: red;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      z-index: 9999;
    }

    .guide {
      position: fixed;
      bottom: 20px;
      width: 100%;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

<!-- CAMERA -->
<video id="video" autoplay muted playsinline></video>

<!-- NÚT ĐÓNG -->
<button class="btn-close" onclick="window.close()">Đóng</button>

<!-- HƯỚNG DẪN -->
<div class="guide">
  📷 Đưa mã QR CCCD vào giữa màn hình
</div>

<script>
  const codeReader = new ZXing.BrowserMultiFormatReader();

  async function startScan() {
    try {
      console.log("Đang mở camera...");

      const devices = await codeReader.listVideoInputDevices();

      if (!devices || devices.length === 0) {
        alert("Không tìm thấy camera");
        return;
      }

      console.log("Danh sách camera:", devices);

      // Ưu tiên camera sau
      let selectedDeviceId = devices[0].deviceId;

      const backCamera = devices.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear")
      );

      if (backCamera) {
        selectedDeviceId = backCamera.deviceId;
      }

      console.log("Dùng camera:", selectedDeviceId);

      codeReader.decodeFromVideoDevice(
        selectedDeviceId,
        'video',
        (result, err) => {

          if (result) {
            console.log("ĐÃ QUÉT ĐƯỢC:", result.text);

            // 👉 TEST: HIỂN THỊ CHUỖI QR
            alert("QR đọc được:\n\n" + result.text);

            // Dừng camera
            codeReader.reset();
          }

          if (err && !(err instanceof ZXing.NotFoundException)) {
            console.error("Lỗi scan:", err);
          }
        }
      );

    } catch (err) {
      alert("Không mở được camera: " + err);
      console.error(err);
    }
  }

  startScan();
</script>

</body>
</html>
