<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Quét QR CCCD - Siêu tốc</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: system-ui, 'Segoe UI', -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .camera-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    /* Khung quét được tối ưu cho QR nhỏ */
    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      border-radius: 24px;
      background: transparent;
      box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(76, 175, 80, 0.9);
    }

    .scan-frame::before,
    .scan-frame::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #4caf50;
      border-style: solid;
      border-width: 0;
    }

    .scan-frame::before {
      top: -2px;
      left: -2px;
      border-top-width: 4px;
      border-left-width: 4px;
      border-radius: 8px 0 0 0;
    }

    .scan-frame::after {
      bottom: -2px;
      right: -2px;
      border-bottom-width: 4px;
      border-right-width: 4px;
      border-radius: 0 0 8px 0;
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #4caf50, #4caf50, transparent);
      animation: scan 2s linear infinite;
      box-shadow: 0 0 6px #4caf50;
    }

    @keyframes scan {
      0% { top: 0; }
      50% { top: 100%; }
      100% { top: 0; }
    }

    .controls {
      padding: 15px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    button {
      background: #d90429;
      border: none;
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    button:active {
      transform: scale(0.96);
    }

    .info {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      background: rgba(0,0,0,0.6);
      color: #ccc;
      backdrop-filter: blur(4px);
    }

    .status-badge {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #ffaa44;
      z-index: 25;
      font-family: monospace;
      pointer-events: none;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      padding: 16px 24px;
      border-radius: 40px;
      color: white;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top: 2px solid #4caf50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <!-- Chỉ cần import qr-scanner (CDN chính thức) -->
  <script type="importmap">
    {
      "imports": {
        "qr-scanner": "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js"
      }
    }
  </script>
</head>
<body>
  <div class="header">📷 QUÉT MÃ QR CCCD - TỐC ĐỘ CAO</div>
  <div class="camera-container">
    <video id="video" playsinline muted></video>
    <div class="overlay">
      <div class="scan-frame">
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="status-badge" id="statusBadge">⚙️ Đang khởi tạo công cụ quét...</div>
  </div>
  <div class="controls">
    <button id="closeBtn">Đóng</button>
  </div>
  <div class="info">✅ Đưa mã QR vào khung xanh · Quét siêu tốc, nhận diện QR nhỏ tốt nhất</div>
  <div id="loadingMsg" class="loading" style="display: none;">
    <div class="spinner"></div> Đang xử lý...
  </div>

  <script type="module">
    import QrScanner from 'qr-scanner';
    
    let scanner = null;
    const video = document.getElementById('video');
    const statusBadge = document.getElementById('statusBadge');
    const loadingDiv = document.getElementById('loadingMsg');
    
    function setStatus(text, isError = false) {
      statusBadge.innerHTML = text;
      statusBadge.style.color = isError ? '#ff8888' : '#aaffaa';
    }
    
    function onCodeFound(result) {
      if (!scanner) return;
      
      // Dừng scanner ngay lập tức để tránh quét nhiều lần
      scanner.stop();
      
      // Gửi dữ liệu về cửa sổ chính
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'qr-scanned', value: result }, '*');
      }
      // Tự động đóng popup
      window.close();
    }
    
    async function startScanner() {
      loadingDiv.style.display = 'flex';
      try {
        // Tạo scanner mới
        scanner = new QrScanner(
          video,
          result => onCodeFound(result.data),
          {
            onDecodeError: (error) => {
              // Lỗi giải mã thường gặp khi QR chưa vào đúng khung, bỏ qua
              // console.debug(error);
            },
            highlightScanRegion: true,
            highlightCodeOutline: true,
            maxScansPerSecond: 15, // Tăng tốc quét lên 15 lần/giây
            preferredCamera: 'environment' // Luôn ưu tiên camera sau
          }
        );
        
        // HIỂN THỊ THÔNG BÁO: KIỂM TRA KHẢ NĂNG TỐI ƯU
        if (QrScanner.hasNativeScanner()) {
          setStatus('✅ Camera sẵn sàng (Chế độ Native Turbo)');
        } else {
          setStatus('✅ Camera sẵn sàng (Chế độ ZXing siêu tốc)');
        }
        
        // Bắt đầu quét
        await scanner.start();
        loadingDiv.style.display = 'none';
      } catch (err) {
        console.error(err);
        setStatus('❌ Lỗi: Không thể truy cập camera. Vui lòng kiểm tra quyền.', true);
        loadingDiv.innerHTML = '❌ Lỗi: Không thể khởi tạo camera';
        loadingDiv.style.display = 'flex';
      }
    }
    
    // Bắt đầu quét
    startScanner();
    
    // Đóng popup khi bấm nút Đóng
    document.getElementById('closeBtn').onclick = () => window.close();
    
    // Dọn dẹp khi thoát
    window.addEventListener('beforeunload', () => {
      if (scanner) {
        scanner.stop();
        scanner.destroy();
      }
    });
  </script>
</body>
</html>
