<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quét QR CCCD</title>

  <!-- Thư viện QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }
    #qr-reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>📷 Quét QR CCCD</h2>
<div id="qr-reader"></div>
<p>Đưa mã QR vào khung</p>

<script>
  let qr;

  function startScan() {
    qr = new Html5Qrcode("qr-reader");

    qr.start(
      { facingMode: { exact: "environment" } },
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        // gửi dữ liệu về Apps Script
        if (window.opener) {
          window.opener.postMessage({
            type: "QR_RESULT",
            data: decodedText
          }, "*");
        }

        alert("✅ Quét thành công!");
        qr.stop();
        window.close();
      },
      () => {}
    ).catch(err => {
      alert("❌ Không mở được camera: " + err);
    });
  }

  startScan();
</script>

</body>
</html>
